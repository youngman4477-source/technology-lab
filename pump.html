<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-KWGDQQN4Q9"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-KWGDQQN4Q9');
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pump Selection Program</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f9;
}

.container {
  max-width: 850px;
  margin: 30px auto;
  background: white;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.back {
  color: #0066cc;
  cursor: pointer;
  font-weight: bold;
}

.lang-btn, .calc-btn {
  background: #ff9800;
  color: white;
  border: none;
  padding: 10px 30px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

h2 {
  text-align: center;
  margin-bottom: 25px;
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(2, 280px);
  justify-content: center;
  gap: 16px 35px;
}

.input-group label {
  font-weight: bold;
  margin-bottom: 6px;
  display: block;
}

.input-group input {
  width: 100%;
  height: 34px;
  padding: 5px 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 15px;
}

.actions {
  margin-top: 20px;
  text-align: center;
}

.result {
  margin-top: 22px;
  background: #eef2f7;
  border-radius: 12px;
  padding: 18px;
  line-height: 1.9;
  font-weight: bold;
}

.pump-box {
  margin-top: 28px;
  padding: 18px;
  background: #fbfbfb;
  border: 1px solid #e2e2e2;
  border-radius: 14px;
}

.pump-title {
  font-weight: bold;
  margin-bottom: 12px;
}

.pump-visual {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 15px;
}

.pipe {
  width: 220px;
  height: 34px;
  background: linear-gradient(180deg, #cfd6df, #9da8b6);
  border: 3px solid #8895a6;
}

.pump-body {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: radial-gradient(circle, #ffffff 20%, #ffb15c 21%, #ff8c00 70%);
  border: 5px solid #d46f00;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  color: white;
  box-shadow: 0 8px 18px rgba(0,0,0,0.15);
}

.flow-text {
  text-align: center;
  margin-top: 12px;
  color: #555;
}

.note {
  margin-top: 15px;
  color: #666;
  font-size: 14px;
  line-height: 1.7;
}

@media (max-width: 700px) {
  .form-grid {
    grid-template-columns: 1fr;
  }

  .pipe {
    width: 120px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="top-bar">
    <div class="back" id="backBtn" onclick="history.back()">⬅ الرجوع</div>
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
  </div>

  <h2 id="title">برنامج اختيار المضخة</h2>

  <div class="form-grid">

    <div class="input-group">
      <label id="flowLabel">التدفق المطلوب (م³/ساعة)</label>
      <input type="number" id="flow" value="320">
    </div>

    <div class="input-group">
      <label id="pressureLabel">الضغط المطلوب (بار)</label>
      <input type="number" id="pressure" value="5">
    </div>

    <div class="input-group">
      <label id="efficiencyLabel">كفاءة المضخة (%)</label>
      <input type="number" id="efficiency" value="70">
    </div>

    <div class="input-group">
      <label id="densityLabel">كثافة السائل (kg/m³)</label>
      <input type="number" id="density" value="876">
    </div>

  </div>

  <div class="actions">
    <button class="calc-btn" id="calcBtn" onclick="calculatePump()">احسب</button>
  </div>

  <div class="result" id="result">أدخل البيانات ثم اضغط احسب.</div>

  <div class="pump-box">
    <div class="pump-title" id="pumpTitle">رسم مبسط لمنظومة الضخ</div>

    <div class="pump-visual">
      <div class="pipe"></div>
      <div class="pump-body">PUMP</div>
      <div class="pipe"></div>
    </div>

    <div class="flow-text" id="flowText">اتجاه الجريان ← من السحب إلى الدفع</div>

    <div class="note" id="noteText">
      هذه الحسابات أولية لاختيار القدرة التقريبية، ولا تغني عن منحنيات الشركة المصنعة أو دراسة NPSH والتشغيل الفعلي.
    </div>
  </div>

</div>

<script>
function getLang() {
  return localStorage.getItem("siteLang") || "ar";
}

function toggleLang() {
  const current = getLang();
  const next = current === "ar" ? "en" : "ar";
  localStorage.setItem("siteLang", next);
  applyLang();
}

function applyLang() {
  const lang = getLang();

  document.documentElement.lang = lang;
  document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";

  const t = {
    ar: {
      langBtn: "EN",
      backBtn: "⬅ الرجوع",
      title: "برنامج اختيار المضخة",
      flowLabel: "التدفق المطلوب (م³/ساعة)",
      pressureLabel: "الضغط المطلوب (بار)",
      efficiencyLabel: "كفاءة المضخة (%)",
      densityLabel: "كثافة السائل (kg/m³)",
      calcBtn: "احسب",
      defaultResult: "أدخل البيانات ثم اضغط احسب.",
      pumpTitle: "رسم مبسط لمنظومة الضخ",
      flowText: "اتجاه الجريان ← من السحب إلى الدفع",
      noteText: "هذه الحسابات أولية لاختيار القدرة التقريبية، ولا تغني عن منحنيات الشركة المصنعة أو دراسة NPSH والتشغيل الفعلي.",
      resultTitle: "نتائج الاختيار الأولي:",
      head: "ارتفاع عمود السائل التقريبي (Head)",
      hydraulicPower: "القدرة الهيدروليكية",
      motorPower: "قدرة المحرك التقريبية",
      motorHp: "قدرة المحرك التقريبية",
      note: "الملاحظة"
    },
    en: {
      langBtn: "AR",
      backBtn: "Back ⬅",
      title: "Pump Selection Program",
      flowLabel: "Required Flow Rate (m³/h)",
      pressureLabel: "Required Pressure (bar)",
      efficiencyLabel: "Pump Efficiency (%)",
      densityLabel: "Fluid Density (kg/m³)",
      calcBtn: "Calculate",
      defaultResult: "Enter the data, then press Calculate.",
      pumpTitle: "Simple Pumping System Diagram",
      flowText: "Flow Direction ← From Suction to Discharge",
      noteText: "These are preliminary calculations for approximate power selection and do not replace manufacturer curves, NPSH study, or actual operating review.",
      resultTitle: "Preliminary Selection Results:",
      head: "Approximate Liquid Column Head",
      hydraulicPower: "Hydraulic Power",
      motorPower: "Approximate Motor Power",
      motorHp: "Approximate Motor Power",
      note: "Note"
    }
  }[lang];

  Object.keys(t).forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = t[id];
  });

  if (!document.getElementById("result").dataset.calculated) {
    document.getElementById("result").textContent = t.defaultResult;
  }
}

function calculatePump() {
  const lang = getLang();

  const text = {
    ar: {
      resultTitle: "نتائج الاختيار الأولي:",
      head: "ارتفاع عمود السائل التقريبي (Head)",
      hydraulicPower: "القدرة الهيدروليكية",
      motorPower: "قدرة المحرك التقريبية",
      motorHp: "قدرة المحرك التقريبية",
      note: "الملاحظة",
      pumpType1: "مضخة إزاحة موجبة أو مضخة متعددة المراحل قد تكون مناسبة.",
      pumpType2: "مضخة طرد مركزي أفقية غالبًا مناسبة.",
      pumpType3: "مضخة طرد مركزي كبيرة أو مضخة Double Suction قد تكون مناسبة.",
      pumpType4: "تحتاج مقارنة مع منحنيات المصنع لاختيار النوع بدقة.",
      error: "يرجى إدخال جميع القيم بشكل صحيح."
    },
    en: {
      resultTitle: "Preliminary Selection Results:",
      head: "Approximate Liquid Column Head",
      hydraulicPower: "Hydraulic Power",
      motorPower: "Approximate Motor Power",
      motorHp: "Approximate Motor Power",
      note: "Note",
      pumpType1: "A positive displacement pump or multistage pump may be suitable.",
      pumpType2: "A horizontal centrifugal pump is usually suitable.",
      pumpType3: "A large centrifugal or double suction pump may be suitable.",
      pumpType4: "Manufacturer pump curves are required for accurate selection.",
      error: "Please enter all values correctly."
    }
  }[lang];

  let Qh = parseFloat(document.getElementById("flow").value);
  let pressureBar = parseFloat(document.getElementById("pressure").value);
  let efficiencyPercent = parseFloat(document.getElementById("efficiency").value);
  let rho = parseFloat(document.getElementById("density").value);

  if (!Qh || !pressureBar || !efficiencyPercent || !rho) {
    document.getElementById("result").innerHTML = text.error;
    return;
  }

  let g = 9.81;
  let Q = Qh / 3600;
  let dp = pressureBar * 100000;
  let efficiency = efficiencyPercent / 100;

  let head = dp / (rho * g);
  let hydraulicPower = dp * Q / 1000;
  let motorPower = hydraulicPower / efficiency;
  let motorHP = motorPower * 1.341;

  let pumpType = "";

  if (Qh < 50 && pressureBar > 10) {
    pumpType = text.pumpType1;
  } else if (Qh >= 50 && pressureBar <= 20) {
    pumpType = text.pumpType2;
  } else if (Qh > 500 && pressureBar <= 15) {
    pumpType = text.pumpType3;
  } else {
    pumpType = text.pumpType4;
  }

  const result = document.getElementById("result");
  result.dataset.calculated = "true";

  result.innerHTML = `
    <div>${text.resultTitle}</div>
    🔹 ${text.head} = ${head.toFixed(2)} m<br>
    🔹 ${text.hydraulicPower} = ${hydraulicPower.toFixed(2)} kW<br>
    🔹 ${text.motorPower} = ${motorPower.toFixed(2)} kW<br>
    🔹 ${text.motorHp} = ${motorHP.toFixed(2)} HP<br>
    🔹 ${text.note}: ${pumpType}
  `;
}

applyLang();
</script>

</body>
</html>
