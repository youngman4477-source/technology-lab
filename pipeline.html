<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pipeline Calculator</title>

<style>
body{font-family:Arial;background:#f3f5f9;margin:0}
.box{max-width:900px;margin:30px auto;background:#fff;padding:20px;border-radius:14px}
.top{display:flex;justify-content:space-between}
.btn{background:#ff8c00;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:20px}
input,select{width:100%;height:35px;border:1px solid #ccc;border-radius:6px}
.result{margin-top:20px;padding:15px;background:#eef2f7;border-radius:10px}
.pipe{height:70px;border-radius:35px;background:#ccc;margin-top:20px;overflow:hidden;position:relative}
.flow{position:absolute;inset:10px;border-radius:30px;animation:move 1s linear infinite}
@keyframes move{from{background-position:120px}to{background-position:0}}
</style>
</head>

<body>

<div class="box">

<div class="top">
<button class="btn" onclick="toggleLang()" id="langBtn">EN</button>
</div>

<h2 id="title">حاسبة الأنابيب</h2>

<div class="grid">

<div><label id="flowL">التدفق</label><input id="flow" value="340"></div>
<div><label id="diamL">القطر</label><input id="diameter" value="1.06"></div>

<div><label id="lenL">الطول</label><input id="len" value="220"></div>
<div><label id="denL">الكثافة</label><input id="den" value="876"></div>

<div><label id="visL">اللزوجة</label><input id="vis" value="8"></div>

<div>
<label id="condL">حالة الأنبوب</label>
<select id="cond" onchange="setRough()">
<option value="new">جديد</option>
<option value="old">قديم</option>
<option value="m">يدوي</option>
</select>
</div>

<div><label id="roughL">الخشونة</label><input id="rough" value="0.045"></div>

</div>

<br>
<button class="btn" onclick="calc()" id="calcBtn">احسب</button>

<div class="result" id="res"></div>

<div class="pipe">
<div class="flow" id="flowBox"></div>
</div>

</div>

<script>

let lang="ar";

function toggleLang(){
lang=lang=="ar"?"en":"ar";

if(lang=="ar"){
title.innerText="حاسبة الأنابيب";
flowL.innerText="التدفق";
diamL.innerText="القطر";
lenL.innerText="الطول";
denL.innerText="الكثافة";
visL.innerText="اللزوجة";
condL.innerText="حالة الأنبوب";
roughL.innerText="الخشونة";
calcBtn.innerText="احسب";
langBtn.innerText="EN";
document.dir="rtl";
}else{
title.innerText="Pipeline Calculator";
flowL.innerText="Flow";
diamL.innerText="Diameter";
lenL.innerText="Length";
denL.innerText="Density";
visL.innerText="Viscosity";
condL.innerText="Pipe Condition";
roughL.innerText="Roughness";
calcBtn.innerText="Calculate";
langBtn.innerText="AR";
document.dir="ltr";
}
}

function setRough(){
if(cond.value=="new"){rough.value=0.015;rough.readOnly=true;}
else if(cond.value=="old"){rough.value=0.045;rough.readOnly=true;}
else{rough.readOnly=false;}
}

function calc(){

let Q=flow.value/3600;
let D=diameter.value;
let L=len.value;
let rho=den.value;
let nu=vis.value*1e-6;
let eps=rough.value/1000;

let A=Math.PI*D*D/4;
let V=Q/A;
let Re=V*D/nu;

let f;
if(Re<2300){f=64/Re;color="red";}
else if(Re<4000){f=0.03;color="yellow";}
else{f=0.25/Math.pow(Math.log10((eps/(3.7*D))+(5.74/Math.pow(Re,0.9))),2);color="red";}

let dp=f*(L/D)*(rho*V*V/2);

res.innerHTML=
"V="+V.toFixed(2)+" m/s<br>"+
"Re="+Re.toFixed(0)+"<br>"+
"f="+f.toFixed(5)+"<br>"+
"ΔP="+(dp/100000).toFixed(2)+" bar";

flowBox.style.background=
"repeating-linear-gradient(90deg,"+color+", "+color+" 40px, #fff 40px, #fff 80px)";

}

setRough();
calc();

</script>

</body>
</html>
