<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Pressure Calculator</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f9;
}

.container {
  max-width: 850px;
  margin: 30px auto;
  background: white;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.back {
  color: #0066cc;
  cursor: pointer;
  font-weight: bold;
}

.lang-btn {
  background: #ff9800;
  color: white;
  border: none;
  padding: 8px 22px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

h2 {
  text-align: center;
  margin-bottom: 25px;
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(2, 280px);
  justify-content: center;
  gap: 16px 35px;
}

.input-group label {
  font-weight: bold;
  margin-bottom: 6px;
  display: block;
}

.input-group input {
  width: 100%;
  height: 34px;
  padding: 5px 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 15px;
}

.actions {
  margin-top: 20px;
  text-align: center;
}

.calc-btn {
  background: #ff9800;
  color: white;
  border: none;
  padding: 10px 35px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.result {
  margin-top: 22px;
  background: #eef2f7;
  border-radius: 12px;
  padding: 18px;
  line-height: 1.9;
  font-weight: bold;
}

.pipe-box {
  margin-top: 28px;
  padding: 18px;
  background: #fbfbfb;
  border: 1px solid #e2e2e2;
  border-radius: 14px;
}

.pipe-title {
  font-weight: bold;
  margin-bottom: 12px;
}

.pipe {
  position: relative;
  height: 70px;
  border-radius: 35px;
  overflow: hidden;
  background: linear-gradient(180deg, #d8dde5, #aeb7c2);
  border: 4px solid #8f9aaa;
}

.flow {
  position: absolute;
  inset: 12px;
  border-radius: 30px;
  background: repeating-linear-gradient(
    90deg,
    #2d9cdb 0px,
    #2d9cdb 30px,
    #79c9f2 30px,
    #79c9f2 60px
  );
  animation: moveFlow 1.2s linear infinite;
}

@keyframes moveFlow {
  from { background-position: 120px 0; }
  to { background-position: 0 0; }
}

.pipe-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  color: #555;
  font-size: 14px;
}

@media (max-width: 700px) {
  .form-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="top-bar">
    <div class="back" id="backBtn" onclick="history.back()">⬅ الرجوع</div>
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
  </div>

  <h2 id="title">حاسبة فقدان الضغط في الأنابيب</h2>

  <div class="form-grid">

    <div class="input-group">
      <label id="flowLabel">التدفق (م³/ساعة)</label>
      <input type="number" id="flow" value="7200">
    </div>

    <div class="input-group">
      <label id="diameterLabel">قطر الأنبوب (متر)</label>
      <input type="number" id="diameter" value="1.06">
    </div>

    <div class="input-group">
      <label id="lengthLabel">طول الأنبوب (متر)</label>
      <input type="number" id="length" value="50000">
    </div>

    <div class="input-group">
      <label id="densityLabel">الكثافة (kg/m³)</label>
      <input type="number" id="density" value="876">
    </div>

  </div>

  <div class="actions">
    <button class="calc-btn" id="calcBtn" onclick="calculate()">احسب</button>
  </div>

  <div class="result" id="result">
    أدخل البيانات ثم اضغط احسب.
  </div>

  <div class="pipe-box">
    <div class="pipe-title" id="pipeTitle">محاكاة تدفق السائل داخل الأنبوب</div>

    <div class="pipe">
      <div class="flow"></div>
    </div>

    <div class="pipe-labels">
      <span id="pipeStart">نهاية الخط</span>
      <span id="pipeDirection">→ اتجاه الجريان</span>
      <span id="pipeEnd">بداية الخط</span>
    </div>
  </div>

</div>

<script>
function getLang() {
  return localStorage.getItem("siteLang") || "ar";
}

function toggleLang() {
  const current = getLang();
  const next = current === "ar" ? "en" : "ar";
  localStorage.setItem("siteLang", next);
  applyLang();
}

function applyLang() {
  const lang = getLang();

  document.documentElement.lang = lang;
  document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";

  const t = {
    ar: {
      langBtn: "EN",
      backBtn: "⬅ الرجوع",
      title: "حاسبة فقدان الضغط في الأنابيب",
      flowLabel: "التدفق (م³/ساعة)",
      diameterLabel: "قطر الأنبوب (متر)",
      lengthLabel: "طول الأنبوب (متر)",
      densityLabel: "الكثافة (kg/m³)",
      calcBtn: "احسب",
      defaultResult: "أدخل البيانات ثم اضغط احسب.",
      pipeTitle: "محاكاة تدفق السائل داخل الأنبوب",
      pipeStart: "نهاية الخط",
      pipeDirection: "→ اتجاه الجريان",
      pipeEnd: "بداية الخط",
      resultTitle: "فقدان الضغط:",
      pascal: "باسكال",
      bar: "بار",
      velocity: "سرعة الجريان",
      meterSecond: "م/ثانية"
    },
    en: {
      langBtn: "AR",
      backBtn: "Back ⬅",
      title: "Pipeline Pressure Loss Calculator",
      flowLabel: "Flow Rate (m³/h)",
      diameterLabel: "Pipe Diameter (m)",
      lengthLabel: "Pipe Length (m)",
      densityLabel: "Density (kg/m³)",
      calcBtn: "Calculate",
      defaultResult: "Enter the data, then press Calculate.",
      pipeTitle: "Liquid Flow Simulation Inside the Pipe",
      pipeStart: "Line End",
      pipeDirection: "Flow Direction →",
      pipeEnd: "Line Start",
      resultTitle: "Pressure Loss:",
      pascal: "Pa",
      bar: "bar",
      velocity: "Flow Velocity",
      meterSecond: "m/s"
    }
  }[lang];

  Object.keys(t).forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = t[id];
  });

  if (!document.getElementById("result").dataset.calculated) {
    document.getElementById("result").textContent = t.defaultResult;
  }
}

function calculate() {
  const lang = getLang();

  const t = {
    ar: {
      resultTitle: "فقدان الضغط:",
      pascal: "باسكال",
      bar: "بار",
      velocity: "سرعة الجريان",
      meterSecond: "م/ثانية"
    },
    en: {
      resultTitle: "Pressure Loss:",
      pascal: "Pa",
      bar: "bar",
      velocity: "Flow Velocity",
      meterSecond: "m/s"
    }
  }[lang];

  let Qh = parseFloat(document.getElementById("flow").value);
  let Q = Qh / 3600;
  let D = parseFloat(document.getElementById("diameter").value);
  let L = parseFloat(document.getElementById("length").value);
  let rho = parseFloat(document.getElementById("density").value);

  if (!Qh || !D || !L || !rho) {
    document.getElementById("result").innerHTML =
      lang === "ar" ? "يرجى إدخال جميع القيم بشكل صحيح." : "Please enter all values correctly.";
    return;
  }

  let area = Math.PI * Math.pow(D / 2, 2);
  let velocity = Q / area;

  let f = 0.02;
  let dp = f * (L / D) * (rho * velocity * velocity / 2);

  let bar = dp / 100000;
  let psi = dp / 6894.76;

  const result = document.getElementById("result");
  result.dataset.calculated = "true";

  result.innerHTML = `
    <div>${t.resultTitle}</div>
    🔹 ${dp.toFixed(2)} ${t.pascal}<br>
    🔹 ${bar.toFixed(2)} ${t.bar}<br>
    🔹 ${psi.toFixed(2)} psi<br>
    🔹 ${t.velocity} = ${velocity.toFixed(2)} ${t.meterSecond}
  `;
}

applyLang();
</script>

</body>
</html>
