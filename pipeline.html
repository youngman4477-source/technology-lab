<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>حاسبة ضغط الأنابيب</title>

<style>
body
  <script>
function togglePipelineLang() {
  const current = localStorage.getItem("siteLang") || "ar";
  localStorage.setItem("siteLang", current === "ar" ? "en" : "ar");
  location.reload();
}

function applyPipelineLang() {
  const lang = localStorage.getItem("siteLang") || "ar";
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";

  const t = {
    ar: {
      title: "حاسبة فقدان الضغط في الأنابيب",
      flowLabel: "التدفق (م³/ساعة)",
      diameterLabel: "قطر الأنبوب (متر)",
      lengthLabel: "طول الأنبوب (متر)",
      densityLabel: "الكثافة (kg/m³)",
      calcBtn: "احسب"
    },
    en: {
      title: "Pipeline Pressure Loss Calculator",
      flowLabel: "Flow Rate (m³/h)",
      diameterLabel: "Pipe Diameter (m)",
      lengthLabel: "Pipe Length (m)",
      densityLabel: "Density (kg/m³)",
      calcBtn: "Calculate"
    }
  }[lang];

  Object.keys(t).forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = t[id];
  });
}

applyPipelineLang();
</script>
  {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f9;
}
.container {
  max-width: 850px;
  margin: 30px auto;
  background: white;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(2, 280px);
  justify-content: center;
  gap: 16px 35px;
}

.input-group input {
  width: 100%;
  height: 34px;
  padding: 5px 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 15px;
}

.back {
  color: #0066cc;
  cursor: pointer;
  margin-bottom: 15px;
  display: inline-block;
}

h2 {
  text-align: center;
  margin-bottom: 25px;
}


.input-group label {
  font-weight: bold;
  margin-bottom: 6px;
  display: block;
}

.actions {
  margin-top: 20px;
  text-align: center;
}

button {
  background: #ff9800;
  color: white;
  border: none;
  padding: 10px 35px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.result {
  margin-top: 22px;
  background: #eef2f7;
  border-radius: 12px;
  padding: 18px;
  line-height: 1.9;
  font-weight: bold;
}

.pipe-box {
  margin-top: 28px;
  padding: 18px;
  background: #fbfbfb;
  border: 1px solid #e2e2e2;
  border-radius: 14px;
}

.pipe-title {
  font-weight: bold;
  margin-bottom: 12px;
}

.pipe {
  position: relative;
  height: 70px;
  border-radius: 35px;
  overflow: hidden;
  background: linear-gradient(180deg, #d8dde5, #aeb7c2);
  border: 4px solid #8f9aaa;
}

.flow {
  position: absolute;
  inset: 12px;
  border-radius: 30px;
  background: repeating-linear-gradient(
    90deg,
    #2d9cdb 0px,
    #2d9cdb 30px,
    #79c9f2 30px,
    #79c9f2 60px
  );
  animation: moveFlow 1.2s linear infinite;
}

@keyframes moveFlow {
  from { background-position: 0 0; }
  to { background-position: 120px 0; }
}

.pipe-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  color: #555;
  font-size: 14px;
}

@media (max-width: 700px) {
  .form-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="back" onclick="history.back()">⬅ الرجوع</div>
  <button onclick="togglePipelineLang()" style="float:left;">EN</button>
<h2 id="title">حاسبة فقدان الضغط في الأنابيب</h2>
<label id="flowLabel">التدفق (م³/ساعة)</label>
<label id="diameterLabel">قطر الأنبوب (متر)</label>
<label id="lengthLabel">طول الأنبوب (متر)</label>
<label id="densityLabel">الكثافة (kg/m³)</label>
<button id="calcBtn" onclick="calculate()">احسب</button>

  <div class="result" id="result">
    أدخل البيانات ثم اضغط احسب.
  </div>

  <div class="pipe-box">
    <div class="pipe-title">محاكاة تدفق السائل داخل الأنبوب</div>

    <div class="pipe">
      <div class="flow"></div>
    </div>

    <div class="pipe-labels">
      <span>بداية الخط</span>
      <span>→ اتجاه الجريان</span>
      <span>نهاية الخط</span>
    </div>
  </div>

</div>

<script>
function calculate() {
  let Qh = parseFloat(document.getElementById("flow").value); // m3/hr
  let Q = Qh / 3600; // m3/s
  let D = parseFloat(document.getElementById("diameter").value);
  let L = parseFloat(document.getElementById("length").value);
  let rho = parseFloat(document.getElementById("density").value);

  let area = Math.PI * Math.pow(D / 2, 2);
  let velocity = Q / area;

  let f = 0.02;
  let dp = f * (L / D) * (rho * velocity * velocity / 2);

  let bar = dp / 100000;
  let psi = dp / 6894.76;

  document.getElementById("result").innerHTML = `
    <div>فقدان الضغط:</div>
    🔹 ${dp.toFixed(2)} باسكال<br>
    🔹 ${bar.toFixed(2)} بار<br>
    🔹 ${psi.toFixed(2)} psi<br>
    🔹 سرعة الجريان = ${velocity.toFixed(2)} م/ثانية
  `;
}
</script>

</body>
</html>
