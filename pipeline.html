<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pipeline Pressure Loss Calculator</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f4f6f9;
}

.container{
  max-width:900px;
  margin:30px auto;
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.top-bar{
  display:flex;
  justify-content:space-between;
}

.lang-btn,.calc-btn{
  background:#ff9800;
  color:white;
  border:none;
  padding:10px 25px;
  border-radius:10px;
  cursor:pointer;
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.input-group label{
  font-weight:bold;
}

.input-group input, select{
  width:100%;
  height:35px;
  border-radius:8px;
  border:1px solid #ccc;
}

.result{
  margin-top:20px;
  padding:15px;
  background:#eef2f7;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="container">

<div class="top-bar">
<button class="lang-btn" onclick="toggleLang()" id="langBtn">EN</button>
</div>

<h2 id="title">حاسبة الأنابيب</h2>

<div class="form-grid">

<div class="input-group">
<label id="flowLabel">التدفق</label>
<input id="flow" value="7200">
</div>

<div class="input-group">
<label id="diameterLabel">القطر</label>
<input id="diameter" value="1.06">
</div>

<div class="input-group">
<label id="lengthLabel">الطول</label>
<input id="length" value="50000">
</div>

<div class="input-group">
<label id="densityLabel">الكثافة</label>
<input id="density" value="876">
</div>

<div class="input-group">
<label id="viscosityLabel">اللزوجة</label>
<input id="viscosity" value="8">
</div>

<div class="input-group">
<label id="pipeConditionLabel">حالة الأنبوب</label>
<select id="pipeCondition" onchange="updateRoughness()">
<option value="new">جديد</option>
<option value="old">قديم</option>
<option value="manual">يدوي</option>
</select>
</div>

<div class="input-group">
<label id="roughnessLabel">الخشونة (mm)</label>
<input id="roughness" value="0.015">
</div>

</div>

<br>
<button class="calc-btn" onclick="calculate()" id="calcBtn">احسب</button>

<div class="result" id="result"></div>

</div>

<script>

function getLang(){
return localStorage.getItem("siteLang") || "ar";
}

function toggleLang(){
let l=getLang()=="ar"?"en":"ar";
localStorage.setItem("siteLang",l);
applyLang();
}

function applyLang(){

let lang=getLang();

document.documentElement.lang=lang;
document.documentElement.dir=lang=="ar"?"rtl":"ltr";

let t={
ar:{
title:"حاسبة الأنابيب",
flowLabel:"التدفق (m³/h)",
diameterLabel:"قطر الأنبوب (m)",
lengthLabel:"الطول (m)",
densityLabel:"الكثافة",
viscosityLabel:"اللزوجة (cSt)",
pipeConditionLabel:"حالة الأنبوب",
roughnessLabel:"الخشونة",
calcBtn:"احسب",
newPipe:"جديد",
oldPipe:"قديم",
manual:"يدوي"
},
en:{
title:"Pipeline Calculator",
flowLabel:"Flow Rate",
diameterLabel:"Diameter",
lengthLabel:"Length",
densityLabel:"Density",
viscosityLabel:"Viscosity",
pipeConditionLabel:"Pipe Condition",
roughnessLabel:"Roughness",
calcBtn:"Calculate",
newPipe:"New",
oldPipe:"Old",
manual:"Manual"
}
}[lang];

for(let id in t){
let el=document.getElementById(id);
if(el) el.textContent=t[id];
}

}

function updateRoughness(){
let c=document.getElementById("pipeCondition").value;
let r=document.getElementById("roughness");

if(c=="new"){r.value=0.015;r.readOnly=true;}
else if(c=="old"){r.value=0.045;r.readOnly=true;}
else{r.readOnly=false;}
}

function calculate(){

let Qh=parseFloat(flow.value);
let D=parseFloat(diameter.value);
let L=parseFloat(document.getElementById("length").value);
let rho=parseFloat(density.value);
let nu=parseFloat(viscosity.value)*1e-6;
let eps=parseFloat(roughness.value)/1000;

let Q=Qh/3600;
let A=Math.PI*D*D/4;
let V=Q/A;

let Re=V*D/nu;

let f;
if(Re<2300) f=64/Re;
else f=0.25/Math.pow(Math.log10((eps/(3.7*D))+(5.74/Math.pow(Re,0.9))),2);

let dp=f*(L/D)*(rho*V*V/2);

document.getElementById("result").innerHTML=
"Velocity = "+V.toFixed(2)+" m/s<br>"+
"Re = "+Re.toFixed(0)+"<br>"+
"f = "+f.toFixed(5)+"<br>"+
"ΔP = "+(dp/100000).toFixed(2)+" bar";

}

applyLang();
updateRoughness();

</script>

</body>
</html>
