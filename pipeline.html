<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pipeline Pressure Loss Calculator | Darcy-Weisbach | Swamee-Jain</title>
<meta name="description" content="Professional pipeline calculator with Reynolds number, flow regime, friction factor using Swamee-Jain equation.">

<meta name="author" content="Engineer Shihab Ahmed Al-Azzi">
<meta name="copyright" content="© 2026 Engineer Shihab Ahmed Al-Azzi">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f6f9;
}

.container {
  max-width: 900px;
  margin: 30px auto;
  background: white;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.back {
  color: #0066cc;
  cursor: pointer;
  font-weight: bold;
}

.lang-btn, .calc-btn {
  background: #ff9800;
  color: white;
  border: none;
  padding: 10px 28px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

h2 {
  text-align: center;
  margin: 20px 0;
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(2, 300px);
  justify-content: center;
  gap: 15px 40px;
}

.input-group label {
  font-weight: bold;
}

.input-group input {
  width: 100%;
  height: 34px;
  padding: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.actions {
  text-align: center;
  margin-top: 20px;
}

.result {
  margin-top: 20px;
  padding: 15px;
  background: #eef2f7;
  border-radius: 12px;
  font-weight: bold;
  line-height: 1.8;
}

.pipe-box {
  margin-top: 25px;
}

.pipe {
  height: 70px;
  border-radius: 35px;
  background: linear-gradient(#d8dde5, #aeb7c2);
  border: 4px solid #8f9aaa;
  position: relative;
  overflow: hidden;
}

.flow {
  position: absolute;
  inset: 12px;
  border-radius: 30px;
  background: repeating-linear-gradient(90deg,#2d9cdb,#2d9cdb 30px,#79c9f2 30px,#79c9f2 60px);
  animation: moveFlow 1.2s linear infinite;
}

@keyframes moveFlow {
  from {background-position: 120px;}
  to {background-position: 0;}
}

footer {
  text-align: center;
  margin-top: 25px;
  font-size: 14px;
  color: #666;
}
</style>
</head>

<body>

<div class="container">

<div class="top-bar">
  <div class="back" onclick="history.back()">⬅</div>
  <button class="lang-btn" onclick="toggleLang()" id="langBtn">EN</button>
</div>

<h2 id="title">حاسبة فقدان الضغط في الأنابيب</h2>

<div class="form-grid">

<div class="input-group">
<label id="flowLabel">التدفق (m³/h)</label>
<input type="number" id="flow" value="7200">
</div>

<div class="input-group">
<label id="diameterLabel">قطر الأنبوب (m)</label>
<input type="number" id="diameter" value="1.06">
</div>

<div class="input-group">
<label id="lengthLabel">طول الأنبوب (m)</label>
<input type="number" id="length" value="50000">
</div>

<div class="input-group">
<label id="densityLabel">الكثافة (kg/m³)</label>
<input type="number" id="density" value="876">
</div>

<div class="input-group">
<label id="viscosityLabel">اللزوجة (cSt)</label>
<input type="number" id="viscosity" value="8">
</div>

<div class="input-group">
<label id="roughnessLabel">خشونة الأنبوب (mm)</label>
<input type="number" id="roughness" value="0.045">
</div>

</div>

<div class="actions">
<button class="calc-btn" onclick="calculate()" id="calcBtn">احسب</button>
</div>

<div class="result" id="result">---</div>

<div class="pipe-box">
<div class="pipe"><div class="flow"></div></div>
</div>

<footer>
© 2026 Technology Lab - جميع الحقوق محفوظة للمهندس شهاب أحمد العزي
</footer>

</div>

<script>

function getLang(){
  return localStorage.getItem("siteLang") || "ar";
}

function toggleLang(){
  let l = getLang() === "ar" ? "en" : "ar";
  localStorage.setItem("siteLang", l);
  applyLang();
}

function applyLang(){
  let lang = getLang();

  document.documentElement.lang = lang;
  document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";

  const t = {
    ar:{
      langBtn:"EN",
      title:"حاسبة فقدان الضغط في الأنابيب",
      flowLabel:"التدفق (m³/h)",
      diameterLabel:"قطر الأنبوب (m)",
      lengthLabel:"طول الأنبوب (m)",
      densityLabel:"الكثافة (kg/m³)",
      viscosityLabel:"اللزوجة (cSt)",
      roughnessLabel:"خشونة الأنبوب (mm)",
      calcBtn:"احسب",
      result:"النتائج",
      reynolds:"رقم رينولدز",
      regime:"نوع الجريان",
      friction:"معامل الاحتكاك",
      velocity:"السرعة",
      pressure:"فقدان الضغط"
    },
    en:{
      langBtn:"AR",
      title:"Pipeline Pressure Loss Calculator",
      flowLabel:"Flow Rate (m³/h)",
      diameterLabel:"Pipe Diameter (m)",
      lengthLabel:"Pipe Length (m)",
      densityLabel:"Density (kg/m³)",
      viscosityLabel:"Viscosity (cSt)",
      roughnessLabel:"Pipe Roughness (mm)",
      calcBtn:"Calculate",
      result:"Results",
      reynolds:"Reynolds Number",
      regime:"Flow Regime",
      friction:"Friction Factor",
      velocity:"Velocity",
      pressure:"Pressure Loss"
    }
  }[lang];

  for(let id in t){
    let el=document.getElementById(id);
    if(el) el.textContent=t[id];
  }
}
<script>
function calculate(){

  let lang = getLang();

  let Qh  = parseFloat(document.getElementById("flow").value);
  let D   = parseFloat(document.getElementById("diameter").value);
  let L   = parseFloat(document.getElementById("length").value);
  let rho = parseFloat(document.getElementById("density").value);
  let cSt = parseFloat(document.getElementById("viscosity").value);
  let roughMM = parseFloat(document.getElementById("roughness").value);

  if (!Qh || !D || !L || !rho || !cSt || !roughMM) {
    document.getElementById("result").innerHTML =
      lang === "ar" ? "يرجى إدخال جميع القيم بشكل صحيح." : "Please enter valid values.";
    return;
  }

  let Q = Qh / 3600;
  let nu = cSt * 1e-6;
  let eps = roughMM / 1000;

  let A = Math.PI * Math.pow(D, 2) / 4;
  let V = Q / A;

  let Re = V * D / nu;

  let regime;
  if (Re < 2300) regime = lang === "ar" ? "طبقي" : "Laminar";
  else if (Re < 4000) regime = lang === "ar" ? "انتقالي" : "Transitional";
  else regime = lang === "ar" ? "مضطرب" : "Turbulent";

  let f;
  if (Re < 2300) {
    f = 64 / Re;
  } else {
    f = 0.25 / Math.pow(
      Math.log10((eps / (3.7 * D)) + (5.74 / Math.pow(Re, 0.9))),
      2
    );
  }

  let dp = f * (L / D) * (rho * V * V / 2);
  let bar = dp / 100000;
  let psi = dp / 6894.76;

  document.getElementById("result").innerHTML = `
    ${lang === "ar" ? "النتائج" : "Results"}<br><br>

    🔹 ${lang === "ar" ? "السرعة" : "Velocity"} = ${V.toFixed(2)} m/s<br>
    🔹 ${lang === "ar" ? "رقم رينولدز" : "Reynolds Number"} = ${Re.toFixed(0)}<br>
    🔹 ${lang === "ar" ? "نوع الجريان" : "Flow Regime"} = ${regime}<br>
    🔹 ${lang === "ar" ? "معامل الاحتكاك" : "Friction Factor"} = ${f.toFixed(5)}<br><br>

    🔹 ${lang === "ar" ? "فقدان الضغط" : "Pressure Loss"} = ${bar.toFixed(2)} bar<br>
    🔹 ${lang === "ar" ? "فقدان الضغط" : "Pressure Loss"} = ${psi.toFixed(2)} psi
  `;

  document.getElementById("result").style.border =
    Re > 4000 ? "2px solid green" : "2px solid red";
}
</script>
</script>

</body>
</html>
