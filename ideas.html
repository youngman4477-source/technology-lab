<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Technology Lab - Ideas</title>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#fffaf5;
      color:#142033;
    }

    header{
      background:#fff;
      border-bottom:1px solid #f1dfcf;
      padding:12px 7%;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .logo-box{
      background:#ff9438;
      color:#fff;
      font-weight:bold;
      padding:16px;
      border-radius:16px;
    }

    nav a{
      text-decoration:none;
      color:#263447;
      margin:0 18px;
      font-weight:bold;
    }

    nav a.active{
      background:#fff0e5;
      color:#d85f00;
      padding:12px 18px;
      border-radius:14px;
    }

    main{
      padding:30px 7%;
    }

    h1{
      font-size:34px;
      margin-bottom:5px;
    }

    .subtitle{
      color:#667085;
      font-size:18px;
      margin-bottom:28px;
    }

    .layout{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px;
    }

    .card{
      background:#fff;
      border:1px solid #ead8c8;
      border-radius:22px;
      padding:28px;
      box-shadow:0 20px 45px rgba(0,0,0,0.04);
      min-height:560px;
    }

    label{
      display:block;
      font-weight:bold;
      margin:18px 0 8px;
    }

    input, textarea, select{
      width:100%;
      box-sizing:border-box;
      border:1px solid #ead8c8;
      border-radius:14px;
      padding:14px;
      font-size:17px;
      background:#fffdfb;
      color:#142033;
    }

    textarea{
      height:170px;
      resize:vertical;
    }

    .buttons{
      display:flex;
      gap:12px;
      margin-top:20px;
    }

    button{
      border:none;
      border-radius:14px;
      padding:13px 22px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
    }

    .publish{
      background:#ff9438;
      color:white;
    }

    .clear{
      background:white;
      color:#d85f00;
      border:1px solid #ffc99e;
    }

    .post{
      border:1px solid #ead8c8;
      border-radius:18px;
      padding:18px;
      margin-bottom:16px;
      background:#fffaf5;
      position:relative;
    }

    .post small{
      color:#d85f00;
      font-weight:bold;
    }

    .post h3{
      margin:10px 0;
    }

    .delete-btn{
      position:absolute;
      top:12px;
      left:12px;
      background:#e74c3c;
      color:white;
      padding:7px 12px;
      border-radius:10px;
      font-size:14px;
    }

    .empty{
      color:#667085;
      margin-top:30px;
      text-align:center;
    }

    @media(max-width:900px){
      .layout{
        grid-template-columns:1fr;
      }

      header{
        flex-direction:column;
        gap:15px;
      }

      nav a{
        margin:6px;
        display:inline-block;
      }
    }
  </style>
</head>

<body>

<header>
  <button class="clear" onclick="history.back()">رجوع</button>

  <nav>
    <a href="index.html">الرئيسية</a>
    <a href="services.html">الخدمات</a>
    <a href="programs.html">البرامج</a>
    <a href="ideas.html" class="active">الأفكار</a>
    <a href="contact.html">التواصل</a>
  </nav>

  <div class="logo">
    <div>
      <h2 style="margin:0;">Technology Lab</h2>
      <p style="margin:0;color:#667085;">منصة للأفكار والبرامج والمنتجات</p>
    </div>
    <div class="logo-box">TL</div>
  </div>
</header>

<main>
  <h1>منشورات الأفكار</h1>
  <p class="subtitle">اكتب أفكارك وملاحظاتك وبرامجك المستقبلية هنا.</p>

  <div class="layout">

    <section class="card">
      <h2>المنشورات المعروضة</h2>
      <div id="postsList">
        <p class="empty" id="emptyMsg">لا توجد منشورات حالياً.</p>
      </div>
    </section>

    <section class="card">
      <h2>إضافة منشور جديد</h2>

      <label>نوع المنشور</label>
      <select id="postType">
        <option>فكرة</option>
        <option>ملاحظة</option>
        <option>برنامج مستقبلي</option>
        <option>تطوير موقع</option>
      </select>

      <label>العنوان</label>
      <input id="postTitle" type="text" placeholder="اكتب عنوان المنشور">

      <label>المحتوى</label>
      <textarea id="postContent" placeholder="اكتب تفاصيل الفكرة أو الملاحظة"></textarea>

      <p style="color:#667085;">يتم حفظ المنشورات داخل المتصفح في هذه النسخة.</p>

      <div class="buttons">
        <button class="publish" onclick="addPost()">نشر الآن</button>
        <button class="clear" onclick="clearForm()">مسح الحقل</button>
      </div>
    </section>

  </div>
</main>

<script>
  let posts = JSON.parse(localStorage.getItem("technologyLabPosts")) || [];

  function savePosts(){
    localStorage.setItem("technologyLabPosts", JSON.stringify(posts));
  }

  function renderPosts(){
    const postsList = document.getElementById("postsList");
    postsList.innerHTML = "";

    if(posts.length === 0){
      postsList.innerHTML = '<p class="empty" id="emptyMsg">لا توجد منشورات حالياً.</p>';
      return;
    }

    posts.forEach((post, index) => {
      const item = document.createElement("div");
      item.className = "post";

      item.innerHTML = `
        <button class="delete-btn" onclick="deletePost(${index})">حذف</button>
        <small>${post.type}</small>
        <h3>${post.title}</h3>
        <p>${post.content}</p>
        <small>${post.date}</small>
      `;

      postsList.appendChild(item);
    });
  }

  function addPost(){
    const type = document.getElementById("postType").value;
    const title = document.getElementById("postTitle").value.trim();
    const content = document.getElementById("postContent").value.trim();

    if(!title || !content){
      alert("يرجى كتابة العنوان والمحتوى");
      return;
    }

    const now = new Date();
    const date =
      String(now.getDate()).padStart(2,"0") + "/" +
      String(now.getMonth()+1).padStart(2,"0") + "/" +
      now.getFullYear();

    posts.unshift({
      type:type,
      title:title,
      content:content,
      date:date
    });

    savePosts();
    renderPosts();
    clearForm();
  }

  function deletePost(index){
    if(confirm("هل تريد حذف هذا المنشور؟")){
      posts.splice(index, 1);
      savePosts();
      renderPosts();
    }
  }

  function clearForm(){
    document.getElementById("postTitle").value = "";
    document.getElementById("postContent").value = "";
  }

  renderPosts();
</script>

</body>
</html>
